<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            <p class="subtitle">Get Random Jokes Instantly</p>
            
            <div class="joke-display">
                <p id="jokeText" class="joke-text">Click the button to get a joke!</p>
            </div>
            
            <div class="category-selector">
                <label for="category">Select Category:</label>
                <select id="category">
                    <option value="any">Any</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock-Knock</option>
                    <option value="general">General</option>
                    <option value="spooky">Spooky</option>
                </select>
            </div>
            
            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="shareBtn" class="btn btn-secondary">Share Joke</button>
                <button id="copyBtn" class="btn btn-secondary">Copy Joke</button>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>
            
            <div id="notification" class="notification"></div>
            
            <div class="joke-counter">
                <p>Jokes fetched: <span id="jokeCount">0</span></p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
