<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator - 140+ Languages</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-xxxxxxxxxxxxxxxx"
     crossorigin="anonymous"></script>
</head>
<body>
    <!-- Top Advertisement -->
    <div class="ad-container top-ad">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
             data-ad-slot="xxxxxxxx"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <div class="container">
        <div class="joke-card">
            <h1>😂 Joke Generator</h1>
            <p class="subtitle">Get Random Jokes Instantly in 140+ Languages</p>
            
            <div class="joke-display">
                <p id="jokeText" class="joke-text">Click the button to get a joke!</p>
            </div>
            
            <div class="controls-section">
                <div class="category-selector">
                    <label for="category">Select Category:</label>
                    <select id="category">
                        <option value="any">Any</option>
                        <option value="programming">Programming</option>
                        <option value="knock-knock">Knock-Knock</option>
                        <option value="general">General</option>
                        <option value="spooky">Spooky</option>
                        <option value="dad">Dad Jokes</option>
                        <option value="school">School</option>
                        <option value="religious">Religious</option>
                        <option value="christmas">Christmas</option>
                        <option value="political">Political</option>
                        <option value="sports">Sports</option>
                        <option value="science">Science</option>
                        <option value="travel">Travel</option>
                        <option value="food">Food</option>
                        <option value="animal">Animal</option>
                        <option value="music">Music</option>
                    </select>
                </div>

                <div class="language-selector">
                    <label for="language">Translate to:</label>
                    <select id="language">
                        <option value="english">English</option>
                        <option value="spanish">Spanish (Español)</option>
                        <option value="french">French (Français)</option>
                        <option value="german">German (Deutsch)</option>
                        <option value="italian">Italian (Italiano)</option>
                        <option value="portuguese">Portuguese (Português)</option>
                        <option value="russian">Russian (Русский)</option>
                        <option value="chinese">Chinese Simplified (简体中文)</option>
                        <option value="japanese">Japanese (日本語)</option>
                        <option value="korean">Korean (한국어)</option>
                        <option value="arabic">Arabic (العربية)</option>
                        <option value="hindi">Hindi (हिन्दी)</option>
                        <option value="bengali">Bengali (বাংলা)</option>
                        <option value="urdu">Urdu (اردو)</option>
                        <option value="thai">Thai (ไทย)</option>
                        <option value="vietnamese">Vietnamese (Tiếng Việt)</option>
                        <option value="turkish">Turkish (Türkçe)</option>
                        <option value="polish">Polish (Polski)</option>
                        <option value="dutch">Dutch (Nederlands)</option>
                        <option value="swedish">Swedish (Svenska)</option>
                        <option value="norwegian">Norwegian (Norsk)</option>
                        <option value="danish">Danish (Dansk)</option>
                        <option value="finnish">Finnish (Suomi)</option>
                        <option value="greek">Greek (Ελληνικά)</option>
                        <option value="czech">Czech (Čeština)</option>
                        <option value="hungarian">Hungarian (Magyar)</option>
                        <option value="romanian">Romanian (Română)</option>
                        <option value="bulgarian">Bulgarian (Български)</option>
                        <option value="croatian">Croatian (Hrvatski)</option>
                        <option value="serbian">Serbian (Српски)</option>
                        <option value="ukrainian">Ukrainian (Українська)</option>
                        <option value="hebrew">Hebrew (עברית)</option>
                        <option value="indonesian">Indonesian (Bahasa Indonesia)</option>
                        <option value="malay">Malay (Bahasa Melayu)</option>
                        <option value="tagalog">Tagalog (Filipino)</option>
                        <option value="swahili">Swahili (Kiswahili)</option>
                        <option value="afrikaans">Afrikaans</option>
                        <option value="irish">Irish (Gaeilge)</option>
                        <option value="icelandic">Icelandic (Íslenska)</option>
                        <option value="estonian">Estonian (Eesti)</option>
                        <option value="latvian">Latvian (Latviešu)</option>
                        <option value="lithuanian">Lithuanian (Lietuvių)</option>
                        <option value="slovak">Slovak (Slovenčina)</option>
                        <option value="slovenian">Slovenian (Slovenščina)</option>
                        <option value="maltese">Maltese (Malti)</option>
                        <option value="cypriot">Cypriot (Κυπριακά)</option>
                        <option value="georgian">Georgian (ქართული)</option>
                        <option value="armenian">Armenian (Հայերեն)</option>
                        <option value="azerbaijani">Azerbaijani (Azərbaycanca)</option>
                        <option value="kazakh">Kazakh (Қазақша)</option>
                        <option value="uzbek">Uzbek (Ўзбек)</option>
                        <option value="tajik">Tajik (Тоҷикӣ)</option>
                        <option value="kyrgyz">Kyrgyz (Кыргызча)</option>
                        <option value="mongolian">Mongolian (Монгол)</option>
                        <option value="nepali">Nepali (नेपाली)</option>
                        <option value="sinhala">Sinhala (සිංහල)</option>
                        <option value="myanmar">Myanmar (မြန်မာ)</option>
                        <option value="khmer">Khmer (ខ្មែរ)</option>

                        <option value="burmese">Burmese (ဗမာ)</option>
                        <option value="somali">Somali</option>
                        <option value="tigrinya">Tigrinya (ትግርኛ)</option>
                        <option value="amharic">Amharic (አማርኛ)</option>
                        <option value="yoruba">Yoruba</option>
                        <option value="igbo">Igbo</option>
                        <option value="hausa">Hausa</option>
                        <option value="zulu">Zulu (isiZulu)</option>
                        <option value="xhosa">Xhosa (isiXhosa)</option>
                        <option value="sotho">Sotho (Sesotho)</option>
                        <option value="tswana">Tswana (Setswana)</option>
                        <option value="persian">Persian (فارسی)</option>
                        <option value="kurdish">Kurdish (کوردی)</option>
                        <option value="pashto">Pashto (پشتو)</option>
                        <option value="albanian">Albanian (Shqiptare)</option>
                        <option value="bosnian">Bosnian (Bosanski)</option>
                        <option value="macedonian">Macedonian (Македонски)</option>
                        <option value="luxembourgish">Luxembourgish (Lëtzebuergesch)</option>
                        <option value="basque">Basque (Euskera)</option>
                        <option value="catalan">Catalan (Català)</option>
                        <option value="galician">Galician (Galego)</option>
                        <option value="welsh">Welsh (Cymraeg)</option>
                        <option value="scottish">Scottish Gaelic (Gàidhlig)</option>
                        <option value="corsican">Corsican (Corsu)</option>
                        <option value="breton">Breton (Brezhoneg)</option>
                        <option value="occitan">Occitan</option>
                        <option value="belarusian">Belarusian (Беларуская)</option>
                        <option value="quechua">Quechua</option>
                        <option value="aymara">Aymara</option>
                        <option value="guarani">Guarani</option>
                        <option value="esperanto">Esperanto</option>
                        <option value="interlingua">Interlingua</option>
                        <option value="latin">Latin</option>
                        <option value="elvish">Quenya (Elvish)</option>
                        <option value="klingon">Klingon (for fun!)</option>
                    </select>
                </div>
            </div>
            
            <div class="button-group">
                <button id="getJokeBtn" class="btn btn-primary">Get Joke</button>
                <button id="translateBtn" class="btn btn-secondary" style="display:none;">Translate</button>
                <button id="shareBtn" class="btn btn-secondary">Share</button>
                <button id="copyBtn" class="btn btn-secondary">Copy</button>
            </div>
            
            <div id="loading" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Loading joke...</p>
            </div>
            
            <div id="notification" class="notification"></div>
            
            <div class="joke-counter">
                <p>Jokes fetched: <span id="jokeCount">0</span></p>
            </div>
        </div>
    </div>

    <!-- Mid Advertisement -->
    <div class="ad-container mid-ad">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
             data-ad-slot="xxxxxxxx"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>

    <!-- Bottom Advertisement -->
    <div class="ad-container bottom-ad">
        <ins class="adsbygoogle"
             style="display:block"
             data-ad-client="ca-pub-xxxxxxxxxxxxxxxx"
             data-ad-slot="xxxxxxxx"
             data-ad-format="auto"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

    <script src="script.js"></script>
</body>
</html>
